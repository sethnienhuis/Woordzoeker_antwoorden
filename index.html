<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Pagina</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 2em;
        }

        .hero-image {
            flex: 1;
            width: 100%;
            object-fit: contain;
            min-height: 0;
        }
    </style>
</head>
<body>

    <header>
        Antwoorden woordzoeker
    </header>

    <img
        class="hero-image"
        src="antwoorden.svg"
        alt="Antwoorden woordzoeker">

</body>
</html>
